app = "bitterblossom-plane"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  BB_INGRESS_BIND = "0.0.0.0:8080"
  BB_SPRITE_BIN = "/usr/local/bin/sprite"

[mounts]
  source = "bb_plane_data"
  destination = "/app/plane/.bb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
