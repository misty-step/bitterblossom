app = "bitterblossom-plane"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  BB_INGRESS_BIND = "0.0.0.0:8080"
  BB_PLANE_DIR = "/app/plane"
  BB_SPRITE_BIN = "/usr/local/bin/sprite"
  BB_LITESTREAM_REQUIRED = "1"
  BB_LITESTREAM_DB_PATH = "/app/plane/.bb/plane.db"
  BB_LITESTREAM_CONFIG = "/tmp/bb-litestream.yml"
  BB_LITESTREAM_REPLICA_URL_ENV = "LITESTREAM_REPLICA_URL"
  BB_LITESTREAM_HEARTBEAT_PATH = "/app/plane/.bb/backup-last-success"
  BB_LITESTREAM_SYNC_INTERVAL_SECONDS = "60"
  BB_LITESTREAM_SYNC_TIMEOUT_SECONDS = "30"
  BB_LITESTREAM_STARTUP_TIMEOUT_SECONDS = "60"

[mounts]
  source = "bb_plane_data"
  destination = "/app/plane"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
