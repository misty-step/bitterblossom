# Manual authoring agent: API-auth OMP/GLM default. It can edit and push a
# branch, but it never has merge authority and never runs from reflex triggers.
version = 2
role = "builder"
harness = "omp"
model = "z-ai/glm-5.2"
auth = "api"
args = ["--thinking", "high"]
secrets = ["OPENROUTER_API_KEY", "GH_TOKEN"]
skills = [
  "harness-kit/deliver#builder",
  "harness-kit/ci#rust-local-gate",
  "bitterblossom/operator-min",
]

# Per-agent governance boundary (backlog 091, schema/read-surface slice).
# The builder may edit and push a branch but never merge; its spend, model,
# and loop surface are bounded and projected read-only through `bb check
# --json`, `bb task list --json`, and `/api/tasks`. Streaming cost is now
# enforced in-flight: a max_cost_per_run_usd breach kills the run and
# escalates through the notification outbox.
[policy]
authority = "edit"
provider_key_name = "openrouter-builder"
provider_spend_cap_usd = 25.0
model_allowlist = ["z-ai/glm-5.2"]
trigger_bindings = ["manual"]
iteration_cap = 1
turn_cap = 120
tool_action_cap = 200
output_bytes_cap = 262144
wall_clock_minutes = 45
side_effect_policy = "kill"
