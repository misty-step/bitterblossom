version = 1
role = "incident-alert-responder"
harness = "command"
model = "z-ai/glm-5.2"
auth = "api"
bin = "bitterblossom/scripts/incident-triage-wrapper.sh"
secrets = ["CANARY_ENDPOINT", "CANARY_API_KEY", "POWDER_INCIDENT_ALERT_API_KEY", "POWDER_API_BASE_URL"]
skills = [
  "harness-kit/diagnose#incident-triage",
  "bitterblossom/operator-min",
]

[policy]
authority = "edit"
model_allowlist = ["z-ai/glm-5.2"]
trigger_bindings = ["manual", "webhook"]
output_bytes_cap = 30000
wall_clock_minutes = 10
side_effect_policy = "quarantine"
