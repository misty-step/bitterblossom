# Codex CLI configuration for sprites (headless VMs).
# Uploaded to ~/.codex/config.toml during bb setup.
# Auth: OPENAI_API_KEY env var injected at dispatch time.

preferred_auth_method = "apikey"
model = "gpt-5.4"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
