agent = "cerberus-reviewer"
substrate = "sprites"
required_artifacts = ["REPORT.json"]

[workspace]
host = "example-org/lane-1"

[[workspace.repos]]
url = "https://github.com/example-org/bitterblossom-example.git"
ref = "main"

[[workspace.repos]]
url = "https://github.com/example-org/cerberus-example.git"
ref = "main"

[budget]
timeout_minutes = 30
max_runs_per_day = 20
max_cost_per_run_usd = 1.25

[[trigger]]
kind = "manual"

[[trigger]]
kind = "webhook"
route = "review"
secret_env = "BB_HOOK_REVIEW"
dedupe_key = "json:/idempotency_key"

[[trigger.filter]]
pointer = "/schema_version"
equals = "weave.remote_event.v1"

[[trigger.filter]]
pointer = "/subject/kind"
equals = "pull_request"

[[trigger.filter]]
pointer = "/repository/full_name"
any_of = ["misty-step/bitterblossom", "external-example/review-target"]

[[trigger.filter]]
pointer = "/action"
any_of = ["opened", "ready_for_review", "synchronize"]

[[trigger.filter]]
pointer = "/actor/login"
not_any_of = ["dependabot[bot]", "renovate[bot]"]

[[trigger.filter]]
pointer = "/payload/draft"
equals = false

[[trigger.filter]]
pointer = "/payload/additions"
max = 2500

[[trigger.filter]]
pointer = "/payload/changed_files"
max = 50
