agent = "self-drill-runner"
substrate = "sprites"
required_artifacts = ["REPORT.json"]

[workspace]
host = "misty-step/lane-1"

[[workspace.repos]]
url = "https://github.com/misty-step/bitterblossom.git"
ref = "master"

[budget]
