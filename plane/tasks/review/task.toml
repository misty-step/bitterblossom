agent = "review-coordinator"
substrate = "sprites"        # workloads never run on the operator's machine

[workspace]
host = "lane-1"              # pi + gh installed; secrets travel per-exec

[budget]
timeout_minutes = 30         # K2.6 paces slower than claude; cost is the cap that matters
max_runs_per_day = 20
max_cost_per_run_usd = 0.50  # advisory; measured K2.6 baseline ~$0.03-0.10/review

[[trigger]]
kind = "manual"              # bb --config plane run review --payload '{"repo":"o/r","pr":N}'

[[trigger]]
kind = "webhook"             # POST /hooks/review (GitHub pull_request events)
route = "review"
secret_env = "BB_HOOK_REVIEW"
dedupe_key = "json:/pull_request/head/sha"   # one run per head SHA, ever

# Containment is mechanism, not card prose: out-of-scope deliveries are
# acknowledged (so GitHub doesn't retry) but never become runs.
[[trigger.filter]]
pointer = "/repository/full_name"
any_of = ["misty-step/bitterblossom"]        # repo allowlist

[[trigger.filter]]
pointer = "/action"
any_of = ["opened", "ready_for_review", "synchronize"]

[[trigger.filter]]
pointer = "/pull_request/draft"
equals = false

[[trigger.filter]]
pointer = "/pull_request/additions"
max = 4000                                   # oversized PRs don't auto-review
