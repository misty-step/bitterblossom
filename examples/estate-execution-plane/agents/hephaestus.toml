cd ..
printf '{"schema":"bb.estate-execution-proof.v1","estate_commit":"225272aa827b3616a45daa9273b8aceaa7a13b96","estate_lock_blob":"57198968cb956be86a9aa91eadc54a9df5264574","workload_identity":"hephaestus","proof":"real_estate_disposable_apply_and_signed_receipts"}\n' > ESTATE_EXECUTION_EVIDENCE.json
printf '{"schema_version":"bb.command_result.v1","result":"Estate exact-plan execution proof passed"}\n'
''',
]
