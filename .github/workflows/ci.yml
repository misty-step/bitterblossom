name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # verify.sh's gitleaks gate scans git history; a shallow clone
          # would silently narrow it to the tip commit.
          fetch-depth: 0
      # bitterblossom-974: verify.sh runs the same secret scan agents run
      # locally. The independent every-branch required check is
      # secret-scan.yml; installing gitleaks here keeps ./scripts/verify.sh
      # CI-identical.
      - name: Install gitleaks (pinned + checksummed)
        run: |
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # bitterblossom-124: dashboard-smoke.mjs is invoked like any other
      # external dev tool, never a committed repo dependency (no
      # package.json/node_modules tracked) -- installed fresh per run.
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
      # The same gate agents run locally: fmt, clippy, tests, coverage
      # ratchet, dashboard browser smoke, public fixture config validation,
      # local operations smoke drill, spine LOC budget.
      - name: Verify
        run: ./scripts/verify.sh

  mint-container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Verify Mint privilege boundary in production image
        run: scripts/mint-tailnet-container-smoke.sh
