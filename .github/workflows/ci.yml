name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The same gate agents run locally: fmt, clippy, tests, plane
      # config validation, local operations smoke drill, spine LOC budget.
      - name: Verify
        run: ./scripts/verify.sh
