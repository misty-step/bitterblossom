version = 1
harness = "pi"
model = "deepseek/deepseek-v4-flash"
role = "docs-watcher"
auth = "api"
secrets = ["OPENROUTER_API_KEY", "GH_TOKEN"]
skills = [
  "harness-kit/document#drift-scan",
  "harness-kit/ci#doc-contracts",
  "bitterblossom/operator-min",
]

[policy]
authority = "read"
provider_key_name = "docs-sync-watcher"
provider_spend_cap_usd = 0.5
model_allowlist = ["deepseek/deepseek-v4-flash"]
trigger_bindings = ["manual", "cron", "webhook"]
iteration_cap = 18
turn_cap = 35
tool_action_cap = 70
output_bytes_cap = 24000
wall_clock_minutes = 25
side_effect_policy = "kill"
