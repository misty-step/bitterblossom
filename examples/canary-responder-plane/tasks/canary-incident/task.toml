agent = "tansy"
substrate = "sprites"

[workspace]
host = "misty-step/lane-1"
repos = [{ url = "https://github.com/misty-step/bitterblossom.git", ref = "master" }]

[budget]
timeout_minutes = 45
max_runs_per_day = 12
max_cost_per_run_usd = 1.50
turn_cap = 40

[[trigger]]
kind = "manual"

[[trigger]]
kind = "webhook"
route = "canary"
secret_env = "BB_HOOK_CANARY"
dedupe_key = "header:X-Delivery-Id"

[[trigger.filter]]
pointer = "/event"
any_of = ["incident.opened", "incident.updated"]

[[trigger.filter]]
pointer = "/incident/service"
any_of = ["canary"]
