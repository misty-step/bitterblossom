# Production-shaped incident responder template.
#
# This file is public starter config, not an operator instance plane. Replace
# example services, hosts, repos, budgets, and hook secrets in your runtime copy.
db_path = ".bb/plane.db"

[ingress]
bind = "127.0.0.1:7077"
max_body_bytes = 1048576
max_cron_catchup_fires = 1

[notify]
# webhook_url = "https://ntfy.sh/my-canary-responder"

[budget]
max_cost_per_day_usd = 5.0
