agent = "branch-pruner"
substrate = "sprites"
required_artifacts = ["REPORT.json"]

[workspace]
host = "example-org/lane-1"

[[workspace.repos]]
url = "https://github.com/example-org/bitterblossom-example.git"
ref = "main"

[budget]
timeout_minutes = 30
max_runs_per_day = 4
max_cost_per_run_usd = 0.01

[[trigger]]
kind = "manual"

[[trigger]]
kind = "cron"
schedule = "0 14 * * 6"
