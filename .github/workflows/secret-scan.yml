# Secret scanning on EVERY branch push and every PR (bitterblossom-974).
#
# Lessons encoded here, from the 950 postmortem:
#   - The previous TruffleHog workflow only ran on PRs + master pushes, so a
#     rescue-branch leak sailed straight past it. `on: push` below has NO
#     branch filter on purpose: every ref, every time.
#   - That workflow was then silently deleted by an unrelated commit
#     (3c439328) and nobody noticed for three months. Branch protection on
#     master requires this job's check by name, so deleting this file makes
#     master unmergeable instead of unguarded.
#
# Rules live in .gitleaks.toml (repo-owned, custom bb- rules beyond stock
# providers); acknowledged historical fingerprints live in .gitleaksignore.
# scripts/secret-scan-selftest.sh proves every custom rule still fires.
name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the scan covers every commit, not just the tip, so
          # a secret buried mid-branch cannot hide behind a clean HEAD.
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksummed)
        run: |
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Custom rules still fire (planted synthetic fixtures)
        run: ./scripts/secret-scan-selftest.sh
      - name: Scan full git history
        run: gitleaks git --redact --no-banner --verbose .
