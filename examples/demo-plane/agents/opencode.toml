# The default open-harness agent (bitterblossom-935): opencode on
# OpenRouter. The only agent class allowed on reflex (webhook/cron)
# triggers — hermetic exec, declared secrets only. Use `pi` (agents/pi.toml)
# instead when the workload needs policy.turn_cap/tool_action_cap/
# iteration_cap: opencode has no CLI flag for any of the three yet, so
# build_command refuses to dispatch a capped opencode agent rather than
# run one unbounded.
version = 1
harness = "opencode"
model = "deepseek/deepseek-v4-flash" # provider defaults to "openrouter"
secrets = ["OPENROUTER_API_KEY"]     # resolved per-exec, never persisted
