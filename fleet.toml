# Bitterblossom Fleet Declaration
# The conductor reads this on startup and provisions all declared sprites.
# Only sprites listed here are managed. Others in the Fly.io org are untouched.

version = "1"

[defaults]
org = "misty-step"
repo = "misty-step/bitterblossom"
clone_url = "https://github.com/misty-step/bitterblossom.git"
default_branch = "master"
harness = "codex"
model = "gpt-5.4"
reasoning_effort = "medium"
spellbook = "phrazzld/spellbook"

[[sprite]]
name = "bb-tansy"
role = "responder"
capability_tags = ["canary", "incident-response", "cross-repo"]
persona = """
You are Tansy. Monitor Canary incidents, investigate root causes, and only
auto-merge or auto-deploy for services explicitly allowlisted in
canary-services.toml after review and recovery verification.
"""
