# Tansy responder: API-auth reflex agent for Canary incident investigation.
# It may recommend or prepare fixes, but this template grants no merge or
# deploy authority by default.
version = 1
role = "responder"
harness = "pi"
model = "deepseek/deepseek-v4-pro"
provider = "openrouter"
auth = "api"
secrets = ["OPENROUTER_API_KEY", "CANARY_ENDPOINT", "CANARY_API_KEY", "GH_TOKEN"]
skills = [
  "harness-kit/diagnose#production-incident",
  "harness-kit/research#bounded-current-evidence",
  "canary-responder#tansy",
]
