version = 1
role = "dependabot-triager"
harness = "command"
model = ""
auth = "api"
bin = "python3"
args = ["bitterblossom/scripts/hygiene-reflex.py", "dependabot-triage"]
secrets = ["GH_TOKEN"]
checkout_secrets = ["GH_TOKEN"]

[policy]
trigger_bindings = ["manual", "cron"]
wall_clock_minutes = 20
output_bytes_cap = 200000
side_effect_policy = "kill"
