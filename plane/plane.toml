# The bitterblossom plane for this machine. Run: bb --config plane serve
db_path = ".bb/plane.db"

[ingress]
bind = "127.0.0.1:7077"

[budget]
max_cost_per_day_usd = 25.0

# Submission-loop merge gate (docs/spine.md). Only blocking-severity
# findings block; termination rests solely on the round cap.
[gate]
required = ["verify", "correctness", "security", "simplification", "product"]
max_rounds = 3
arbiter = "arbiter"
