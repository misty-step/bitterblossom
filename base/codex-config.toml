# Codex CLI configuration for sprites (headless VMs).
# Uploaded to ~/.codex/config.toml during bb setup.
# Auth: OPENAI_API_KEY/CODEX_API_KEY are sourced from the sprite runtime env file.
#
# Note: model, reasoning_effort, web_search, and sandbox are set
# via CLI flags by the conductor (Conductor.Codex module).
# Only values NOT overridden by the conductor belong here.

preferred_auth_method = "apikey"
approval_policy = "never"
