product:
  name: Bitterblossom
  description: "Event plane for agent workloads: define tasks, bind agents, attach triggers, and run them durably on sprites with cost, budget, and trace visible from the bb CLI."
audience: developer
voice: clear, concrete, and specific to shipped operator behavior
changelog:
  source: auto
artifacts:
  markdown: docs/releases/{version}.md
  plaintext: null
  html: null
  json: docs/releases/releases.json
  rss: null
release:
  profile: synthesis-only
model:
  policy: balanced
  primary: null
  fallbacks: []
budget:
  max_input_tokens: 12000
  max_output_tokens: 1200
  max_usd: null
