name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shell Scripts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find scripts -type f -name "*.sh" -print0 \
            | xargs -0 shellcheck -x -S error

  python:
    name: Python Checks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==8.4.1 ruff==0.15.0
      - name: Ruff
        run: ruff check base/hooks scripts/conductor.py scripts/test_conductor.py
      - name: Pytest
        run: python -m pytest -q base/hooks scripts/test_conductor.py

  yaml:
    name: YAML Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: python -m pip install --upgrade yamllint==1.38.0
      - name: Lint composition YAML
        run: yamllint -c .yamllint.yml compositions

  go:
    name: Go Checks
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: make test
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
      - name: Build
        run: make build

  merge_gate:
    name: merge-gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: [shellcheck, python, yaml, go]
    steps:
      - name: Require green merge inputs
        env:
          # Keep this list aligned with `needs`; merge-gate is the single PR check to require.
          SHELLCHECK_RESULT: ${{ needs.shellcheck.result }}
          PYTHON_RESULT: ${{ needs.python.result }}
          YAML_RESULT: ${{ needs.yaml.result }}
          GO_RESULT: ${{ needs.go.result }}
        run: |
          set -euo pipefail
          for result in "$SHELLCHECK_RESULT" "$PYTHON_RESULT" "$YAML_RESULT" "$GO_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "merge-gate blocked by dependency result: $result"
              exit 1
            fi
          done
