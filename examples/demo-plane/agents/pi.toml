# An api-auth agent: pi on OpenRouter. Kept as the exception harness
# (bitterblossom-935: opencode is the default open harness) for workloads
# that need policy.turn_cap/tool_action_cap/iteration_cap enforcement,
# which opencode cannot do pre-execution today (no CLI flag for any of the
# three). See agents/opencode.toml for the default.
version = 1
harness = "pi"
model = "moonshotai/kimi-k2.6"   # provider defaults to "openrouter"
secrets = ["OPENROUTER_API_KEY"] # resolved per-exec, never persisted
