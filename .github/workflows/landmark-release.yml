name: Synthesize Release Notes

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  synthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: misty-step/landmark@v1
        with:
          mode: synthesis-only
          healthcheck: "true"
          node-version: "24"
          release-tag: ${{ github.event.release.tag_name }}
          github-token: ${{ secrets.GH_RELEASE_TOKEN }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          product-description: "Event plane for agent workloads: define tasks, bind agents, attach triggers, and run them durably on sprites with cost, budget, and trace visible from the bb CLI."
          audience: developer
          voice-guide: clear, concrete, and specific to shipped operator behavior
          changelog-source: auto
          notes-output-file: docs/releases/{version}.md
          notes-output-json: docs/releases/releases.json
