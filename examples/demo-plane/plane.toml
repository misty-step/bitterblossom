# The plane: db location, ingress bind, notifications, global budget.
db_path = ".bb/plane.db"

[ingress]
bind = "127.0.0.1:7077"

[notify]
# State transitions only (dead letter, budget park, boot recovery).
# webhook_url = "https://ntfy.sh/my-plane"

[budget]
max_cost_per_day_usd = 25.0

# Submission-loop merge gate (docs/spine.md). Uncomment with verdict
# tasks: a task with `verdict = "<kind>"` becomes a storm member whose
# result must be verdict JSON; `bb gate --change <key>` is the arithmetic.
# [gate]
# required = ["verify", "correctness"]   # kinds that must report before clear
# quorum = 2                             # optional; defaults to required.len()
# arm_timeout_seconds = 3600             # stuck members escalate instead of hanging
# max_rounds = 3                         # rounds 1..=max_rounds, then escalate
# arbiter = "arbiter"                    # kind whose `pass` sustains a rejection
