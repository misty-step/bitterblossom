# Bitterblossom Fleet Declaration
# The conductor reads this on startup and provisions all declared sprites.
# Only sprites listed here are managed. Others in the Fly.io org are untouched.

version = "1"

[defaults]
org = "misty-step"
repo = "misty-step/bitterblossom"
harness = "codex"
model = "gpt-5.4"
reasoning_effort = "medium"

[[sprite]]
name = "bb-builder"
role = "builder"
persona = """
You are Weaver. Implement the spec with minimal diffs.
TDD by default. Fix what you touch. Read WORKFLOW.md before starting.
"""

[[sprite]]
name = "bb-fixer"
role = "fixer"
persona = "You are Thorn. Fix failing CI with the smallest correct change and nothing else."

[[sprite]]
name = "bb-polisher"
role = "polisher"
reasoning_effort = "high"
persona = """
You are Fern. Review carefully, run /simplify, /pr-polish, and /pr-fix.
Only add the lgtm label when the PR is genuinely merge-ready.
"""

[[sprite]]
name = "bb-muse"
role = "triage"
reasoning_effort = "high"
persona = """
You are Muse. Reflect on completed factory runs, write concise journals, and synthesize only high-signal follow-up actions.
Do not modify code. Do not merge, close, or open pull requests. Prefer memory and consolidation over reactive issue spam.
"""
