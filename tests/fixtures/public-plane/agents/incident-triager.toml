version = 1
role = "incident-responder"
harness = "command"
model = "z-ai/glm-5.2"
auth = "api"
bin = "bitterblossom/scripts/incident-triage-wrapper.sh"
secrets = ["OPENROUTER_API_KEY", "GH_TOKEN", "CANARY_ENDPOINT", "CANARY_API_KEY"]
checkout_secrets = ["GH_TOKEN"]
skills = [
  "harness-kit/diagnose#incident-triage",
  "harness-kit/deliver#builder",
  "harness-kit/code-review#pr-review",
  "bitterblossom/operator-min",
]

[policy]
authority = "merge"
# bitterblossom-969: the command harness is cost-blind (cost_usd is whatever
# the wrapper self-reports, if anything), so an api-auth agent holding
# OPENROUTER_API_KEY is refused admission unless a provider-side child-key
# cap is declared here and minted (`bb keys mint incident-triager`).
provider_key_name = "incident-triager"
provider_spend_cap_usd = 15.0
model_allowlist = ["z-ai/glm-5.2"]
trigger_bindings = ["manual", "webhook"]
output_bytes_cap = 120000
wall_clock_minutes = 120
side_effect_policy = "quarantine"
