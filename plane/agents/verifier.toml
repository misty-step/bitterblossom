# Deterministic gate member: runs the repo gate directly — no LLM ever
# mediates verify.sh. Exit code IS the verdict (command harness).
harness = "command"
bin = "sh"
args = ["-c", "rev=$(grep -o '\"rev\": *\"[^\"]*\"' EVENT.json | head -1 | sed 's/.*\"\\([^\"]*\\)\"$/\\1/'); repo=$(grep -o '\"repo\": *\"[^\"]*\"' EVENT.json | head -1 | sed 's/.*\"\\([^\"]*\\)\"$/\\1/'); git clone \"https://x-access-token:${GH_TOKEN}@github.com/${repo}.git\" target && cd target && git fetch origin \"$rev\" && git checkout -q FETCH_HEAD && ./scripts/verify.sh"]
secrets = ["GH_TOKEN"]
