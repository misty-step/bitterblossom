name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # bitterblossom-124: dashboard-smoke.mjs is invoked like any other
      # external dev tool, never a committed repo dependency (no
      # package.json/node_modules tracked) -- installed fresh per run.
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
      # The same gate agents run locally: fmt, clippy, tests, coverage
      # ratchet, dashboard browser smoke, public fixture config validation,
      # local operations smoke drill, spine LOC budget.
      - name: Verify
        run: ./scripts/verify.sh

  mint-container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Verify Mint privilege boundary in production image
        run: scripts/mint-tailnet-container-smoke.sh
